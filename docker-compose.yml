services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - USE_MOCK_PIPELINE=${USE_MOCK_PIPELINE:-false}
      - FALLBACK_TO_MOCK_ON_LLM_ERROR=${FALLBACK_TO_MOCK_ON_LLM_ERROR:-true}
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api
    depends_on:
      - backend
